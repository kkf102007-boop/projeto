<!doctype html>
<html lang="pt-br" class="light">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />

    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Devlinks</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="container">
      <div id="profile">
        <img
          src="./assets/avatar.png"
          alt="foto de carl johnson de cordão de prata, oculos escuro e camisa do eazy-e"
        />
        <p>@cidieibro</p>
      </div>

      <div id="switch">
        <button onclick="toggleMode()"></button>
        <span></span>
      </div>

      <ul>
        <li>
          <a href="#">inscrever-se no NWL</a>
        </li>
        <li>
          <a href="#">baixar meu e-book</a>
        </li>
        <li>
          <a href="#">ver meu portfólio</a>
        </li>
        <li>
          <a href="https://rocketseat.com.br/explorer" target="_blank"
            >conheça o explorer</a
          >
        </li>
      </ul>
      <div id="social-links">
        <a href="https://www.fronteditor.dev/" target="_blank">
          <ion-icon name="logo-github"></ion-icon>
        </a>
        <a href="https://www.fronteditor.dev/" target="_blank">
          <ion-icon name="logo-instagram"></ion-icon>
        </a>
        <a href="https://www.fronteditor.dev/" target="_blank">
          <ion-icon name="logo-youtube"></ion-icon>
        </a>
        <a href="https://www.fronteditor.dev/" target="_blank">
          <ion-icon name="logo-tiktok"></ion-icon>
        </a>
      </div>

      <footer>
        Feito com ♥ pela <a href="https://Rocketseat.com.br">Rocketseat</a>
      </footer>
    </div>

    <script
      type="module"
      src="https://unpkg.com/ionicons@8.0.13/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@8.0.13/dist/ionicons/ionicons.js"
    ></script>

    <script src="./script.js"></script>
  </body>
</html>
